<body>

         <!-- Swiper -->
  <div class="swiper mySwiper">

      <div class="swiper-slide">
        <img src="https://cdn.magloft.com/github/swiper/images/page-002.jpg" />
      </div>
      <div class="swiper-slide">
        <img src="https://cdn.magloft.com/github/swiper/images/page-003.jpg" />
      </div>
      <div class="swiper-slide">
        <img src="https://cdn.magloft.com/github/swiper/images/page-004.jpg" />
      </div>
      <div class="swiper-slide">
        <img src="https://cdn.magloft.com/github/swiper/images/page-005.jpg" />
      </div>
      <div class="swiper-slide">
        <img src="https://cdn.magloft.com/github/swiper/images/page-006.jpg" />

      <div class="swiper-slide">

  </div>

   
   
    <footer>
        <div class="contenedor">
        <div class="contacto_wapp small_box">+54 9 11 3049 4419</div>
        <div class="contacto_form small_box">Formulario</div>
        <div class="contacto_redes small_box">
            <a href="#" class="">Youtube</a>
            <a href="#" class="">Twitter</a>
            <a href="#" class="">Facebook</a>
            <a href="#" class="">Instagram</a>
        </div>
        <div class="ubicacion small_box">

        </div>

    <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

  <!-- Initialize Swiper -->
  <script>
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: 1,
      centeredSlides: false,
      slidesPerGroupSkip: 1,
      grabCursor: true,
      keyboard: {
        enabled: true,
      },
      breakpoints: {
        769: {
          slidesPerView: 2,
          slidesPerGroup: 2,
        },
      },
      scrollbar: {
        el: ".swiper-scrollbar",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
    });
  </script>
</body>
</html>
